name: Deploy to Hostinger (Safe Runtime)

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          npm ci
          npm run build

      - name: Deploy laravel_app (code only)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./
          server-dir: /laravel_app/
          state-name: .ftp-state-laravel_app.json
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            **/.env
            **/node_modules/**
            **/tests/**
            **/storage/**
            **/bootstrap/cache/*.php
            **/public/storage/**
            **/public/hot

      - name: Deploy public_html (keep runtime files)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./public/
          server-dir: /public_html/
          state-name: .ftp-state-public_html.json
          dangerous-clean-slate: false
          exclude: |
            **/storage/**
            **/.well-known/**
